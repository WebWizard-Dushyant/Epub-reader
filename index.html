<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photon Reader</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JSZip (Required for epub.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <!-- ePub.js -->
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg-color: #F9F7F1;
            --text-color: #2C2C2C;
            --ui-bg: #FFFFFF;
            --ui-border: #E5E5E5;
            --accent: #4F46E5;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow: hidden; /* Prevent native scroll */
        }

        /* Themes */
        body.theme-sepia {
            --bg-color: #F4ECD8;
            --text-color: #433422;
            --ui-bg: #EAE0C8;
            --ui-border: #D5C8A0;
            --accent: #B05C00;
        }
        
        body.theme-dark {
            --bg-color: #1A1A1A;
            --text-color: #E0E0E0;
            --ui-bg: #2D2D2D;
            --ui-border: #404040;
            --accent: #818CF8;
        }

        /* UI Elements */
        .glass-panel {
            background-color: var(--ui-bg);
            border-bottom: 1px solid var(--ui-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .btn {
            color: var(--text-color);
            transition: all 0.2s;
        }
        .btn:hover {
            color: var(--accent);
            transform: scale(1.05);
        }

        /* Viewer Container for 3D Animations */
        #viewer-container {
            perspective: 2000px;
            width: 100%;
            height: calc(100vh - 120px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #viewer {
            width: 100%;
            max-width: 800px;
            height: 100%;
            background: var(--bg-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.02);
            transform-style: preserve-3d;
        }

        /* Page Turn Animations */
        .turn-next-out {
            animation: pageFlipLeftOut 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
            transform-origin: left center;
        }
        .turn-next-in {
            animation: pageFlipRightIn 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
            transform-origin: right center;
        }
        .turn-prev-out {
            animation: pageFlipRightOut 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
            transform-origin: right center;
        }
        .turn-prev-in {
            animation: pageFlipLeftIn 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
            transform-origin: left center;
        }

        @keyframes pageFlipLeftOut {
            0% { transform: rotateY(0deg); opacity: 1; }
            100% { transform: rotateY(-90deg); opacity: 0; box-shadow: inset -20px 0 20px rgba(0,0,0,0.1); }
        }
        @keyframes pageFlipRightIn {
            0% { transform: rotateY(90deg); opacity: 0; box-shadow: inset 20px 0 20px rgba(0,0,0,0.1); }
            100% { transform: rotateY(0deg); opacity: 1; }
        }
        @keyframes pageFlipRightOut {
            0% { transform: rotateY(0deg); opacity: 1; }
            100% { transform: rotateY(90deg); opacity: 0; box-shadow: inset 20px 0 20px rgba(0,0,0,0.1); }
        }
        @keyframes pageFlipLeftIn {
            0% { transform: rotateY(-90deg); opacity: 0; box-shadow: inset -20px 0 20px rgba(0,0,0,0.1); }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        /* Hide epubjs default iframe scrollbars */
        iframe {
            overflow: hidden !important;
        }

        /* TOC Sidebar */
        #toc-sidebar {
            background-color: var(--ui-bg);
            border-right: 1px solid var(--ui-border);
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
        }
        #toc-sidebar.open {
            transform: translateX(0);
        }
        .toc-item {
            color: var(--text-color);
            opacity: 0.8;
            transition: all 0.2s;
        }
        .toc-item:hover {
            opacity: 1;
            color: var(--accent);
            padding-left: 0.25rem;
        }

        /* Initial State Screen */
        #upload-screen {
            background: linear-gradient(135deg, var(--bg-color), var(--ui-bg));
        }
        
        /* Custom scrollbar for TOC */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--ui-border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body class="theme-light flex flex-col h-screen w-screen">

    <!-- Top Navigation Bar -->
    <header class="glass-panel w-full flex justify-between items-center p-4 z-50 h-[60px]">
        <div class="flex items-center gap-4">
            <button id="btn-menu" class="btn p-2 rounded-full hidden" title="Table of Contents">
                <i data-lucide="menu"></i>
            </button>
            <div class="flex items-center gap-2">
                <i data-lucide="atom" class="text-indigo-500" style="color: var(--accent)"></i>
                <h1 class="text-lg font-bold tracking-wider hidden sm:block">Photon Reader</h1>
            </div>
        </div>

        <!-- Book Title (Dynamic) -->
        <div id="book-title" class="absolute left-1/2 transform -translate-x-1/2 font-serif font-medium text-sm sm:text-base opacity-70 truncate max-w-[40%] text-center"></div>

        <div class="flex items-center gap-3 sm:gap-4">
            <!-- Theme Selector -->
            <div class="relative group hidden sm:block">
                <button class="btn p-2" title="Themes">
                    <i data-lucide="palette"></i>
                </button>
                <div class="absolute right-0 mt-2 w-32 bg-[var(--ui-bg)] border border-[var(--ui-border)] rounded-lg shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 overflow-hidden">
                    <button class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm" onclick="setTheme('light')">Photon (Light)</button>
                    <button class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm" onclick="setTheme('sepia')">Sepia</button>
                    <button class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 text-sm" onclick="setTheme('dark')">Dark Matter</button>
                </div>
            </div>

            <!-- Font Size -->
            <div class="flex items-center gap-1 bg-black/5 dark:bg-white/5 rounded-full px-2 py-1 hidden sm:flex">
                <button id="btn-font-decrease" class="btn p-1" title="Decrease Font"><i data-lucide="a-arrow-down" class="w-4 h-4"></i></button>
                <span id="font-size-display" class="text-xs w-8 text-center">100%</span>
                <button id="btn-font-increase" class="btn p-1" title="Increase Font"><i data-lucide="a-arrow-up" class="w-4 h-4"></i></button>
            </div>

            <!-- Open File -->
            <label class="btn p-2 cursor-pointer flex items-center gap-2 bg-indigo-500 text-white rounded-full hover:bg-indigo-600 transition-colors shadow-sm" style="background-color: var(--accent); color: white;">
                <i data-lucide="folder-open" class="w-5 h-5"></i>
                <span class="hidden sm:block text-sm font-medium px-1">Open EPUB</span>
                <input type="file" id="file-input" accept=".epub" class="hidden" />
            </label>
        </div>
    </header>

    <!-- Main Content Area -->
    <div class="flex-1 relative flex w-full h-[calc(100vh-120px)]">
        
        <!-- Sidebar (TOC) -->
        <aside id="toc-sidebar" class="absolute left-0 top-0 h-full w-64 z-40 overflow-y-auto shadow-xl p-4 flex flex-col gap-2">
            <h2 class="font-bold text-lg mb-4 border-b border-[var(--ui-border)] pb-2">Contents</h2>
            <ul id="toc-list" class="space-y-3 text-sm font-serif">
                <!-- TOC items injected here -->
            </ul>
        </aside>

        <!-- Initial Upload Screen -->
        <div id="upload-screen" class="absolute inset-0 z-30 flex flex-col items-center justify-center text-center p-6">
            <div class="w-24 h-24 mb-6 text-indigo-500" style="color: var(--accent)">
                <i data-lucide="book-open" class="w-full h-full stroke-1"></i>
            </div>
            <h2 class="text-3xl font-bold mb-4 font-serif">Welcome to Photon Reader</h2>
            <p class="mb-8 opacity-75 max-w-md">An elegant, scientifically-themed reader. Select an EPUB file from your device to begin exploring. Your files remain completely private and are never uploaded.</p>
            <label class="cursor-pointer px-8 py-3 rounded-full text-white font-medium shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1" style="background-color: var(--accent);">
                Choose Book
                <input type="file" id="file-input-main" accept=".epub" class="hidden" />
            </label>
        </div>

        <!-- Book Viewer -->
        <main id="viewer-container" class="relative z-10 mx-auto px-4 sm:px-12">
            <!-- Left invisible click zone -->
            <div id="prev-zone" class="absolute left-0 top-0 w-[15%] h-full z-20 cursor-pointer hidden md:block"></div>
            
            <div id="viewer" class="w-full h-full font-serif"></div>
            
            <!-- Right invisible click zone -->
            <div id="next-zone" class="absolute right-0 top-0 w-[15%] h-full z-20 cursor-pointer hidden md:block"></div>
        </main>
    </div>

    <!-- Footer / Progress Bar -->
    <footer id="footer" class="glass-panel w-full h-[60px] flex items-center justify-between px-6 z-50 opacity-0 transition-opacity duration-500">
        <div class="text-xs opacity-60 w-1/4 truncate" id="chapter-name"></div>
        <div class="flex-1 flex flex-col items-center max-w-md mx-4">
            <div class="w-full bg-[var(--ui-border)] h-1.5 rounded-full overflow-hidden mb-1 relative">
                <div id="progress-bar" class="h-full rounded-full transition-all duration-300" style="background-color: var(--accent); width: 0%;"></div>
            </div>
            <div class="text-xs font-mono opacity-70" id="progress-text">0%</div>
        </div>
        <div class="w-1/4 flex justify-end gap-4">
            <button id="btn-prev" class="btn"><i data-lucide="chevron-left"></i></button>
            <button id="btn-next" class="btn"><i data-lucide="chevron-right"></i></button>
        </div>
    </footer>

    <!-- Overlay for TOC -->
    <div id="overlay" class="absolute inset-0 bg-black/20 z-30 hidden backdrop-blur-sm transition-opacity"></div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // State Variables
        let book = null;
        let rendition = null;
        let currentFontSize = 100; // Percentage
        let isAnimating = false;
        const viewerElement = document.getElementById('viewer');

        // UI Elements
        const fileInputs = [document.getElementById('file-input'), document.getElementById('file-input-main')];
        const uploadScreen = document.getElementById('upload-screen');
        const tocSidebar = document.getElementById('toc-sidebar');
        const btnMenu = document.getElementById('btn-menu');
        const overlay = document.getElementById('overlay');
        const bookTitleEl = document.getElementById('book-title');
        const chapterNameEl = document.getElementById('chapter-name');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const footer = document.getElementById('footer');

        // Theme Definitions for ePub.js inside the iframe
        const themes = {
            light: {
                body: { background: '#F9F7F1', color: '#2C2C2C' },
                p: { 'font-family': 'Merriweather, serif', 'line-height': '1.6' }
            },
            sepia: {
                body: { background: '#F4ECD8', color: '#433422' },
                p: { 'font-family': 'Merriweather, serif', 'line-height': '1.6' }
            },
            dark: {
                body: { background: '#1A1A1A', color: '#E0E0E0' },
                p: { 'font-family': 'Merriweather, serif', 'line-height': '1.6' },
                a: { color: '#818CF8' }
            }
        };

        // File Loading
        fileInputs.forEach(input => {
            input.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    if (window.FileReader) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            loadBook(e.target.result);
                        };
                        reader.readAsArrayBuffer(file);
                    }
                }
            });
        });

        // Initialize Book
        function loadBook(bookData) {
            if (book) {
                book.destroy();
                viewerElement.innerHTML = '';
            }

            uploadScreen.style.display = 'none';
            btnMenu.classList.remove('hidden');
            footer.classList.remove('opacity-0');

            book = ePub(bookData);
            
            rendition = book.renderTo("viewer", {
                width: "100%",
                height: "100%",
                spread: "none",
                manager: "continuous",
                flow: "paginated"
            });

            // Register Themes
            rendition.themes.register("light", themes.light);
            rendition.themes.register("sepia", themes.sepia);
            rendition.themes.register("dark", themes.dark);
            
            // Set initial theme based on body class
            const currentTheme = document.body.className.includes('sepia') ? 'sepia' : 
                                 document.body.className.includes('dark') ? 'dark' : 'light';
            rendition.themes.select(currentTheme);
            rendition.themes.fontSize(`${currentFontSize}%`);

            rendition.display();

            // Book Metadata
            book.ready.then(() => {
                const meta = book.package.metadata;
                bookTitleEl.textContent = meta.title || "Unknown Title";
                document.title = `${meta.title} - Photon Reader`;
                
                // Generate locations for progress tracking (might take a moment for large books)
                return book.locations.generate(1600); 
            }).then((locations) => {
                // Update Progress on Location Change
                rendition.on('relocated', function(location) {
                    const percent = book.locations.percentageFromCfi(location.start.cfi);
                    const percentage = Math.round(percent * 100);
                    progressBar.style.width = `${percentage}%`;
                    progressText.textContent = `${percentage}%`;
                    
                    // Update Chapter Name (approximate based on TOC)
                    const currentTOCItem = book.navigation.get(location.start.href);
                    if(currentTOCItem) {
                        chapterNameEl.textContent = currentTOCItem.label;
                    }
                });
            });

            // Table of Contents
            book.loaded.navigation.then((nav) => {
                const tocList = document.getElementById('toc-list');
                tocList.innerHTML = '';
                nav.forEach((item) => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.textContent = item.label;
                    a.href = "#";
                    a.className = "toc-item block cursor-pointer";
                    a.onclick = (e) => {
                        e.preventDefault();
                        rendition.display(item.href);
                        toggleMenu(false);
                    };
                    li.appendChild(a);
                    tocList.appendChild(li);
                });
            });

            // Setup Touch / Swipe Support inside the iframe
            setupRenditionEvents();
        }

        // --- Navigation and Animations ---

        function nextPage() {
            if (isAnimating || !rendition) return;
            isAnimating = true;

            viewerElement.classList.add('turn-next-out');
            
            setTimeout(() => {
                rendition.next().then(() => {
                    viewerElement.classList.remove('turn-next-out');
                    viewerElement.classList.add('turn-next-in');
                    
                    setTimeout(() => {
                        viewerElement.classList.remove('turn-next-in');
                        isAnimating = false;
                    }, 400); // Matches CSS animation duration
                });
            }, 300); // Trigger page turn slightly before animation ends for smoothness
        }

        function prevPage() {
            if (isAnimating || !rendition) return;
            isAnimating = true;

            viewerElement.classList.add('turn-prev-out');
            
            setTimeout(() => {
                rendition.prev().then(() => {
                    viewerElement.classList.remove('turn-prev-out');
                    viewerElement.classList.add('turn-prev-in');
                    
                    setTimeout(() => {
                        viewerElement.classList.remove('turn-prev-in');
                        isAnimating = false;
                    }, 400);
                });
            }, 300);
        }

        // Setup Events inside ePub iframe
        function setupRenditionEvents() {
            // Touch Swipe Logic for iframes
            let touchStartX = 0;
            let touchEndX = 0;
            
            rendition.on('touchstart', event => {
                touchStartX = event.changedTouches[0].screenX;
            });

            rendition.on('touchend', event => {
                touchEndX = event.changedTouches[0].screenX;
                handleSwipe();
            });

            function handleSwipe() {
                const threshold = 50; // minimum pixels to be considered a swipe
                if (touchEndX < touchStartX - threshold) {
                    nextPage(); // Swipe Left
                }
                if (touchEndX > touchStartX + threshold) {
                    prevPage(); // Swipe Right
                }
            }

            // Keyboard support inside iframe
            rendition.on('keyup', event => {
                if(event.key === 'ArrowRight') nextPage();
                if(event.key === 'ArrowLeft') prevPage();
            });
        }

        // Global Event Listeners
        document.getElementById('btn-next').addEventListener('click', nextPage);
        document.getElementById('btn-prev').addEventListener('click', prevPage);
        document.getElementById('next-zone').addEventListener('click', nextPage);
        document.getElementById('prev-zone').addEventListener('click', prevPage);

        document.addEventListener('keyup', (e) => {
            if(e.key === 'ArrowRight') nextPage();
            if(e.key === 'ArrowLeft') prevPage();
        });

        // --- Theming ---
        window.setTheme = function(theme) {
            document.body.className = `theme-${theme} flex flex-col h-screen w-screen`;
            if (rendition) {
                rendition.themes.select(theme);
            }
        };

        // --- Font Sizing ---
        document.getElementById('btn-font-increase').addEventListener('click', () => {
            if (currentFontSize < 200) {
                currentFontSize += 10;
                updateFontSize();
            }
        });
        document.getElementById('btn-font-decrease').addEventListener('click', () => {
            if (currentFontSize > 70) {
                currentFontSize -= 10;
                updateFontSize();
            }
        });

        function updateFontSize() {
            document.getElementById('font-size-display').textContent = `${currentFontSize}%`;
            if (rendition) {
                rendition.themes.fontSize(`${currentFontSize}%`);
            }
        }

        // --- Sidebar TOC Logic ---
        function toggleMenu(force) {
            const isOpen = force !== undefined ? force : !tocSidebar.classList.contains('open');
            if (isOpen) {
                tocSidebar.classList.add('open');
                overlay.classList.remove('hidden');
            } else {
                tocSidebar.classList.remove('open');
                overlay.classList.add('hidden');
            }
        }
        btnMenu.addEventListener('click', () => toggleMenu());
        overlay.addEventListener('click', () => toggleMenu(false));

    </script>
</body>
</html>
