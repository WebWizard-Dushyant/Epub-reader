<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Photon Reader</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JSZip & ePub.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <!-- localForage (Offline IndexedDB storage) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&family=Inter:wght@400;500;600&family=Courier+Prime&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');

        :root {
            --bg-color: #F9FAFB;
            --reader-bg: #FFFFFF;
            --text-color: #111827;
            --ui-bg: rgba(255, 255, 255, 0.95);
            --ui-border: #E5E7EB;
            --accent: #4F46E5;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow: hidden; 
        }

        /* Themed Physics Modes */
        body.theme-light { --bg-color: #F9FAFB; --reader-bg: #FFFFFF; --text-color: #111827; --ui-bg: rgba(255, 255, 255, 0.95); --ui-border: #E5E7EB; --accent: #4F46E5; }
        body.theme-dark { --bg-color: #0F172A; --reader-bg: #121212; --text-color: #E2E8F0; --ui-bg: rgba(15, 23, 42, 0.95); --ui-border: #334155; --accent: #818CF8; }
        body.theme-reading { --bg-color: #B2D8B6; --reader-bg: #CCE8CF; --text-color: #1A2E20; --ui-bg: rgba(204, 232, 207, 0.95); --ui-border: #A3C9A8; --accent: #276F41; }
        body.theme-funky { --bg-color: #191A21; --reader-bg: #282A36; --text-color: #F8F8F2; --ui-bg: rgba(40, 42, 54, 0.95); --ui-border: #44475A; --accent: #FF79C6; }
        body.theme-classic { --bg-color: #E6D5B8; --reader-bg: #FBF0D9; --text-color: #5F4B32; --ui-bg: rgba(251, 240, 217, 0.95); --ui-border: #D4C3A3; --accent: #B05C00; }

        .glass-panel { background-color: var(--ui-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--ui-border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .glass-panel-top { border-bottom: none; border-top: 1px solid var(--ui-border); box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.05); }
        .glass-menu { background-color: var(--ui-bg); backdrop-filter: blur(16px); border: 1px solid var(--ui-border); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        
        .btn { color: var(--text-color); transition: all 0.2s; }
        .btn:hover { color: var(--accent); transform: scale(1.05); }
        .btn-active { color: var(--accent); background: rgba(128,128,128,0.1); }

        /* Reader UI Overlay Transitions */
        .ui-overlay { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease; }
        .ui-hidden-top { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .ui-hidden-bottom { transform: translateY(100%); opacity: 0; pointer-events: none; }

        #viewer-container { perspective: 2000px; width: 100vw; height: 100vh; display: none; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; overflow: hidden; }
        #viewer { width: 100%; max-width: 800px; height: 100%; background: var(--reader-bg); box-shadow: 0 0 20px rgba(0,0,0,0.02); transform-style: preserve-3d; transition: background-color 0.3s ease; }
        
        #library-screen { display: flex; flex-direction: column; width: 100vw; height: calc(100vh - 60px); background: var(--bg-color); overflow-y: auto; padding: 1.5rem; }

        /* 3D Page Turn */
        .turn-next-out { animation: pageFlipLeftOut 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards; transform-origin: left center; }
        .turn-next-in { animation: pageFlipRightIn 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards; transform-origin: right center; }
        .turn-prev-out { animation: pageFlipRightOut 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards; transform-origin: right center; }
        .turn-prev-in { animation: pageFlipLeftIn 0.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards; transform-origin: left center; }

        @keyframes pageFlipLeftOut { 0% { transform: rotateY(0deg); opacity: 1; } 100% { transform: rotateY(-90deg); opacity: 0; box-shadow: inset -20px 0 20px rgba(0,0,0,0.1); } }
        @keyframes pageFlipRightIn { 0% { transform: rotateY(90deg); opacity: 0; box-shadow: inset 20px 0 20px rgba(0,0,0,0.1); } 100% { transform: rotateY(0deg); opacity: 1; } }
        @keyframes pageFlipRightOut { 0% { transform: rotateY(0deg); opacity: 1; } 100% { transform: rotateY(90deg); opacity: 0; box-shadow: inset 20px 0 20px rgba(0,0,0,0.1); } }
        @keyframes pageFlipLeftIn { 0% { transform: rotateY(-90deg); opacity: 0; box-shadow: inset -20px 0 20px rgba(0,0,0,0.1); } 100% { transform: rotateY(0deg); opacity: 1; } }

        iframe { overflow: hidden !important; }

        #toc-sidebar { background-color: var(--ui-bg); border-right: 1px solid var(--ui-border); transform: translateX(-100%); transition: transform 0.3s ease-in-out; }
        #toc-sidebar.open { transform: translateX(0); }
        .toc-item { color: var(--text-color); opacity: 0.8; transition: all 0.2s; }
        .toc-item:hover { opacity: 1; color: var(--accent); padding-left: 0.25rem; }
        
        .book-card { cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; position: relative; }
        .book-card:hover { transform: translateY(-4px); }
        .book-cover-img { object-fit: cover; width: 100%; aspect-ratio: 2/3; background-color: var(--ui-border); border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--ui-border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body class="theme-light flex flex-col h-screen w-screen">

    <!-- LIBRARY HEADER -->
    <header id="library-header" class="glass-panel w-full flex justify-between items-center p-4 z-40 h-[60px] safe-top">
        <div class="flex items-center gap-2">
            <i data-lucide="atom" style="color: var(--accent)"></i>
            <h1 class="text-lg font-bold tracking-wider">Photon Library</h1>
        </div>
        <div class="flex items-center gap-2 sm:gap-4">
            <button id="btn-install" class="btn p-2 hidden font-medium flex items-center gap-1 text-sm bg-black/5 dark:bg-white/10 rounded-full px-3" title="Install App">
                <i data-lucide="download" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Install</span>
            </button>
            <label class="btn p-2 cursor-pointer flex items-center gap-1 text-white rounded-full transition-colors shadow-sm px-4" style="background-color: var(--accent);">
                <i data-lucide="plus" class="w-4 h-4"></i>
                <span class="text-sm font-medium">Add Book</span>
                <input type="file" id="file-input" accept=".epub" class="hidden" />
            </label>
        </div>
    </header>

    <!-- READER UI HEADER (Mobile Optimized) -->
    <header id="reader-header" class="glass-panel ui-overlay ui-hidden-top absolute top-0 w-full flex justify-between items-center px-4 py-3 z-[60] h-[60px] safe-top">
        <div class="flex items-center gap-2 w-1/4">
            <button id="btn-home" class="btn p-2 rounded-full" title="Back to Library">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <button id="btn-menu" class="btn p-2 rounded-full" title="Table of Contents">
                <i data-lucide="list" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Truncated Title for small screens -->
        <div id="book-title" class="font-serif font-medium text-sm sm:text-base opacity-90 truncate text-center w-2/4 px-2"></div>

        <div class="flex items-center justify-end w-1/4 relative">
            <button id="btn-settings-toggle" class="btn p-2 rounded-full" title="Reading Settings">
                <i data-lucide="settings-2" class="w-5 h-5"></i>
            </button>
            
            <!-- Mobile-Friendly Settings Dropdown -->
            <div id="settings-menu" class="glass-menu absolute top-12 right-0 w-56 rounded-xl shadow-xl opacity-0 invisible transition-all duration-200 transform origin-top-right scale-95 p-3 flex flex-col gap-4 z-[70]">
                
                <!-- Font Controls -->
                <div class="flex items-center justify-between bg-black/5 dark:bg-white/5 rounded-lg p-1">
                    <button id="btn-font-decrease" class="btn p-2 rounded-md hover:bg-black/10 dark:hover:bg-white/10"><i data-lucide="a-arrow-down" class="w-4 h-4"></i></button>
                    <span id="font-size-display" class="text-xs font-mono w-10 text-center font-bold">100%</span>
                    <button id="btn-font-increase" class="btn p-2 rounded-md hover:bg-black/10 dark:hover:bg-white/10"><i data-lucide="a-arrow-up" class="w-4 h-4"></i></button>
                </div>

                <!-- Theme Selection -->
                <div class="grid grid-cols-5 gap-1">
                    <button class="w-8 h-8 rounded-full border shadow-sm mx-auto transition-transform hover:scale-110" style="background: #FFFFFF; border-color: #E5E7EB;" onclick="setTheme('light')" title="Photon (Light)"></button>
                    <button class="w-8 h-8 rounded-full border shadow-sm mx-auto transition-transform hover:scale-110" style="background: #121212; border-color: #334155;" onclick="setTheme('dark')" title="Dark Matter"></button>
                    <button class="w-8 h-8 rounded-full border shadow-sm mx-auto flex items-center justify-center transition-transform hover:scale-110" style="background: #CCE8CF; border-color: #A3C9A8;" onclick="setTheme('reading')" title="Optimal (Focus)">
                        <span class="text-[#1A2E20] text-[10px] font-bold">R</span>
                    </button>
                    <button class="w-8 h-8 rounded-full border shadow-sm mx-auto flex items-center justify-center transition-transform hover:scale-110" style="background: #282A36; border-color: #44475A;" onclick="setTheme('funky')" title="Quantum Pop">
                        <span class="text-[#8BE9FD] text-[10px] font-bold">Q</span>
                    </button>
                    <button class="w-8 h-8 rounded-full border shadow-sm mx-auto flex items-center justify-center transition-transform hover:scale-110" style="background: #FBF0D9; border-color: #D4C3A3;" onclick="setTheme('classic')" title="Retrograde">
                        <span class="text-[#5F4B32] text-[10px] font-bold serif">C</span>
                    </button>
                </div>

                <!-- Fullscreen -->
                <button id="btn-fullscreen" class="btn flex items-center justify-center gap-2 w-full py-2 rounded-lg bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 text-sm font-medium">
                    <i data-lucide="maximize" class="w-4 h-4"></i> Fullscreen
                </button>
            </div>
        </div>
    </header>

    <!-- Library Screen -->
    <main id="library-screen" class="z-20">
        <div id="library-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 sm:gap-6"></div>
        <div id="empty-state" class="hidden flex-col items-center justify-center h-full opacity-50 mt-20">
            <i data-lucide="book-dashed" class="w-16 h-16 mb-4"></i>
            <p>Your library is empty.</p>
            <p class="text-sm">Click "Add Book" to get started.</p>
        </div>
    </main>

    <!-- Book Viewer -->
    <main id="viewer-container" class="z-10">
        <!-- Z-Index layered click zones so UI overlays can be clicked safely -->
        <div id="prev-zone" class="absolute left-0 top-14 w-[30%] h-[calc(100%-110px)] z-20 cursor-pointer"></div>
        <div id="center-zone" class="absolute left-[30%] top-14 w-[40%] h-[calc(100%-110px)] z-20 cursor-pointer"></div>
        <div id="next-zone" class="absolute right-0 top-14 w-[30%] h-[calc(100%-110px)] z-20 cursor-pointer"></div>
        
        <div id="viewer" class="w-full h-full"></div>
    </main>

    <!-- Sidebar (TOC) -->
    <aside id="toc-sidebar" class="absolute left-0 top-0 h-full w-72 z-[80] shadow-2xl p-4 flex flex-col gap-2">
        <h2 class="font-bold text-lg mb-4 border-b border-[var(--ui-border)] pb-2 flex justify-between items-center">
            Contents
            <button class="btn p-1 bg-black/5 dark:bg-white/5 rounded-full" onclick="toggleMenu(false)"><i data-lucide="x" class="w-4 h-4"></i></button>
        </h2>
        <ul id="toc-list" class="space-y-3 text-sm overflow-y-auto pb-6"></ul>
    </aside>

    <!-- READER UI FOOTER (Mobile Optimized) -->
    <footer id="reader-footer" class="glass-panel glass-panel-top ui-overlay ui-hidden-bottom absolute bottom-0 w-full h-[50px] sm:h-[60px] flex items-center justify-between px-4 sm:px-6 z-[60] safe-bottom">
        <div class="text-xs opacity-60 w-1/4 truncate hidden sm:block" id="chapter-name"></div>
        
        <div class="flex-1 flex flex-col items-center max-w-sm mx-auto w-full px-2">
            <div class="w-full bg-[var(--ui-border)] h-1 rounded-full overflow-hidden mb-1 sm:mb-1.5 relative">
                <div id="progress-bar" class="h-full rounded-full transition-all duration-300" style="background-color: var(--accent); width: 0%;"></div>
            </div>
            <div class="text-[10px] sm:text-xs font-mono opacity-80 font-medium" id="progress-text">Calculating...</div>
        </div>
        
        <div class="w-1/4 flex justify-end gap-1 hidden sm:flex">
            <button onclick="prevPage()" class="btn p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-full"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
            <button onclick="nextPage()" class="btn p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-full"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
        </div>
    </footer>

    <div id="overlay" class="absolute inset-0 bg-black/40 z-[70] hidden backdrop-blur-sm transition-opacity" onclick="closeAllOverlays()"></div>
    <div id="loading-overlay" class="absolute inset-0 bg-[var(--bg-color)] z-[100] hidden flex-col items-center justify-center">
        <i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4" style="color: var(--accent)"></i>
        <p class="font-medium opacity-80">Parsing Book Geometry...</p>
    </div>

    <script>
        lucide.createIcons();

        // --- Core Variables ---
        let book = null;
        let rendition = null;
        let currentFontSize = 100;
        let isAnimating = false;
        let libraryData = []; 
        let currentActiveBookId = null;
        let currentLocationCfi = null;
        let locationsReady = false;
        let uiVisible = false;
        let settingsVisible = false;
        
        const libraryScreen = document.getElementById('library-screen');
        const viewerContainer = document.getElementById('viewer-container');
        const viewerElement = document.getElementById('viewer');
        const tocSidebar = document.getElementById('toc-sidebar');
        const overlay = document.getElementById('overlay');
        const loadingOverlay = document.getElementById('loading-overlay');
        const settingsMenu = document.getElementById('settings-menu');
        
        const libraryHeader = document.getElementById('library-header');
        const readerHeader = document.getElementById('reader-header');
        const readerFooter = document.getElementById('reader-footer');
        
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const bookTitleEl = document.getElementById('book-title');

        // Physics/Style Themes Configuration for Epub.js iframe content
        const themesConfig = {
            light: { 
                body: { background: '#FFFFFF !important', color: '#111827 !important', 'font-family': 'Inter, sans-serif !important' }, 
                'p, div, span, h1, h2, h3, h4, h5, h6, li, blockquote': { color: '#111827 !important', background: 'transparent !important', 'font-family': 'inherit !important' },
                a: { color: '#4F46E5 !important' }
            },
            dark: { 
                body: { background: '#121212 !important', color: '#E2E8F0 !important', 'font-family': 'Inter, sans-serif !important' }, 
                'p, div, span, h1, h2, h3, h4, h5, h6, li, blockquote': { color: '#E2E8F0 !important', background: 'transparent !important', 'font-family': 'inherit !important' }, 
                a: { color: '#818CF8 !important' } 
            },
            reading: { 
                body: { background: '#CCE8CF !important', color: '#1A2E20 !important', 'font-family': 'Inter, sans-serif !important', 'line-height': '1.8 !important' }, 
                'p, div, span, h1, h2, h3, h4, h5, h6, li, blockquote': { color: '#1A2E20 !important', background: 'transparent !important', 'font-family': 'inherit !important' },
                a: { color: '#276F41 !important' }
            },
            funky: { 
                body: { background: '#282A36 !important', color: '#F8F8F2 !important', 'font-family': '"Courier Prime", monospace !important', 'line-height': '1.6 !important' }, 
                'p, div, span, li, blockquote': { color: '#F8F8F2 !important', background: 'transparent !important', 'font-family': 'inherit !important' }, 
                'h1, h2, h3, h4, h5, h6': { color: '#FF79C6 !important', background: 'transparent !important', 'font-family': 'inherit !important' },
                a: { color: '#8BE9FD !important' } 
            },
            classic: { 
                body: { background: '#FBF0D9 !important', color: '#5F4B32 !important', 'font-family': 'Lora, serif !important', 'line-height': '1.5 !important' }, 
                'p, div, span, h1, h2, h3, h4, h5, h6, li, blockquote': { color: '#5F4B32 !important', background: 'transparent !important', 'font-family': 'inherit !important' },
                a: { color: '#B05C00 !important' }
            }
        };

        // --- App Init & Library ---
        async function initApp() {
            localforage.config({ name: 'PhotonReader', storeName: 'books' });
            libraryData = await localforage.getItem('library_metadata') || [];
            renderLibrary();
        }

        function renderLibrary() {
            const grid = document.getElementById('library-grid');
            const emptyState = document.getElementById('empty-state');
            grid.innerHTML = '';
            
            if (libraryData.length === 0) {
                emptyState.classList.remove('hidden'); emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden'); emptyState.classList.remove('flex');
                
                libraryData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'book-card group flex flex-col gap-2 w-full';
                    card.onclick = () => openBookFromLibrary(item.id);
                    
                    const coverSrc = item.coverBase64 || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" fill="%23E5E5E5"><rect width="100%" height="100%"/><text x="50%" y="50%" fill="%23999" font-family="sans-serif" font-size="14" text-anchor="middle">No Cover</text></svg>';
                    
                    card.innerHTML = `
                        <div class="relative w-full aspect-[2/3] bg-[var(--ui-border)] rounded-lg overflow-hidden shadow-sm">
                            <img src="${coverSrc}" class="w-full h-full object-cover" alt="${item.title}">
                            <button onclick="deleteBook(event, '${item.id}')" class="absolute top-2 right-2 bg-red-500/90 backdrop-blur text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-all hover:bg-red-600 hover:scale-110 z-30" title="Delete Book">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div class="px-1">
                            <h3 class="font-bold text-sm truncate" title="${item.title}">${item.title}</h3>
                            <p class="text-xs opacity-70 truncate">${item.author || 'Unknown Author'}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                lucide.createIcons();
            }
        }

        async function deleteBook(event, id) {
            event.stopPropagation();
            if(confirm("Erase this book from local storage? This cannot be undone.")) {
                libraryData = libraryData.filter(b => b.id !== id);
                await localforage.setItem('library_metadata', libraryData);
                await localforage.removeItem(id);
                renderLibrary();
            }
        }

        document.getElementById('file-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            loadingOverlay.classList.remove('hidden'); loadingOverlay.classList.add('flex');

            const id = 'book_' + Date.now();
            const arrayBuffer = await file.arrayBuffer();
            
            // CRITICAL FIX: Clone the array buffer! ePub.js/JSZip consumes and neuters the original buffer, 
            // which causes it to save an empty file to the database, resulting in a blank book later.
            const bufferForEpub = arrayBuffer.slice(0);
            
            const tempBook = ePub(bufferForEpub);
            let coverBase64 = null;
            let meta = { title: "Unknown Title", creator: "Unknown Author" };

            try {
                await tempBook.ready;
                meta = tempBook.package.metadata;
                const coverUrl = await tempBook.coverUrl();
                if (coverUrl) {
                    coverBase64 = await blobUrlToBase64(coverUrl);
                }
            } catch (err) {
                console.error("Error parsing EPUB metadata:", err);
            } finally {
                tempBook.destroy();
            }

            await localforage.setItem(id, arrayBuffer);
            
            const newBookMeta = {
                id: id, title: meta.title || "Unknown Title", author: meta.creator || "Unknown Author",
                coverBase64: coverBase64, lastCfi: null
            };
            
            libraryData.unshift(newBookMeta);
            await localforage.setItem('library_metadata', libraryData);
            
            renderLibrary();
            loadingOverlay.classList.add('hidden'); loadingOverlay.classList.remove('flex');
            
            openBookFromLibrary(id);
        });

        async function blobUrlToBase64(blobUrl) {
            const response = await fetch(blobUrl);
            const blob = await response.blob();
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        }

        // --- Reader Logic & UI Management ---

        function toggleReaderUI(forceState) {
            uiVisible = forceState !== undefined ? forceState : !uiVisible;
            if (uiVisible) {
                readerHeader.classList.remove('ui-hidden-top');
                readerFooter.classList.remove('ui-hidden-bottom');
            } else {
                readerHeader.classList.add('ui-hidden-top');
                readerFooter.classList.add('ui-hidden-bottom');
                closeAllOverlays();
            }
        }

        function toggleSettings() {
            settingsVisible = !settingsVisible;
            if(settingsVisible) {
                settingsMenu.classList.remove('opacity-0', 'invisible', 'scale-95');
                settingsMenu.classList.add('opacity-100', 'visible', 'scale-100');
            } else {
                settingsMenu.classList.add('opacity-0', 'invisible', 'scale-95');
                settingsMenu.classList.remove('opacity-100', 'visible', 'scale-100');
            }
        }

        function toggleMenu(force) {
            const isOpen = force !== undefined ? force : !tocSidebar.classList.contains('open');
            if (isOpen) { 
                tocSidebar.classList.add('open'); 
                overlay.classList.remove('hidden'); 
                settingsVisible = false; toggleSettings(); // close settings if open
            } else { 
                tocSidebar.classList.remove('open'); 
                overlay.classList.add('hidden'); 
            }
        }

        function closeAllOverlays() {
            toggleMenu(false);
            if(settingsVisible) toggleSettings();
        }

        async function openBookFromLibrary(id) {
            loadingOverlay.classList.remove('hidden'); loadingOverlay.classList.add('flex');
            const bookMeta = libraryData.find(b => b.id === id);
            const bookData = await localforage.getItem(id);
            
            if (!bookData || bookData.byteLength === 0) {
                alert("This book's data was corrupted during a previous upload. Please delete it from your library using the red trash icon and add it again.");
                loadingOverlay.classList.add('hidden'); loadingOverlay.classList.remove('flex');
                return;
            }
            
            currentActiveBookId = id;
            locationsReady = false;
            
            libraryScreen.style.display = 'none';
            libraryHeader.style.display = 'none';
            viewerContainer.style.display = 'flex';
            
            bookTitleEl.textContent = bookMeta.title;
            document.title = `${bookMeta.title} - Photon Reader`;
            
            toggleReaderUI(true);

            if (book) { book.destroy(); viewerElement.innerHTML = ''; }

            book = ePub(bookData);
            
            // Re-render viewer logic
            rendition = book.renderTo("viewer", { 
                width: "100%", height: "100%", spread: "none", manager: "continuous", flow: "paginated" 
            });

            // Register all themes dynamically
            Object.keys(themesConfig).forEach(t => rendition.themes.register(t, themesConfig[t]));
            
            // Apply current UI theme
            const activeTheme = Array.from(document.body.classList).find(c => c.startsWith('theme-'))?.replace('theme-', '') || 'light';
            rendition.themes.select(activeTheme);
            rendition.themes.fontSize(`${currentFontSize}%`);

            if (bookMeta.lastCfi) { rendition.display(bookMeta.lastCfi); } else { rendition.display(); }

            // Handle Page Turns Sync
            rendition.on('relocated', function(location) {
                currentLocationCfi = location.start.cfi;
                saveReadingPosition(currentActiveBookId, currentLocationCfi);
                updatePageProgress();
                
                const currentTOCItem = book.navigation.get(location.start.href);
                if(currentTOCItem) { document.getElementById('chapter-name').textContent = currentTOCItem.label; }
            });

            book.ready.then(() => {
                loadingOverlay.classList.add('hidden'); loadingOverlay.classList.remove('flex');
                return book.locations.generate(1024); 
            }).then(() => {
                locationsReady = true;
                updatePageProgress(); 
            });

            book.loaded.navigation.then((nav) => {
                const tocList = document.getElementById('toc-list');
                tocList.innerHTML = '';
                nav.forEach((item) => {
                    const li = document.createElement('li'); const a = document.createElement('a');
                    a.textContent = item.label; a.href = "#"; a.className = "toc-item block cursor-pointer py-1";
                    a.onclick = (e) => { e.preventDefault(); rendition.display(item.href); closeAllOverlays(); toggleReaderUI(false); };
                    li.appendChild(a); tocList.appendChild(li);
                });
            });

            setTimeout(() => { toggleReaderUI(false); }, 2500); 
        }

        function updatePageProgress() {
            if (!locationsReady || !book || !currentLocationCfi) {
                progressText.textContent = "Processing geometry...";
                return;
            }
            const currentPage = book.locations.locationFromCfi(currentLocationCfi);
            const totalPages = book.locations.total;
            if (currentPage > 0) {
                progressText.textContent = `Page ${currentPage} of ${totalPages}`;
                progressBar.style.width = `${Math.round((currentPage / totalPages) * 100)}%`;
            }
        }

        async function saveReadingPosition(id, cfi) {
            const index = libraryData.findIndex(b => b.id === id);
            if (index !== -1) {
                libraryData[index].lastCfi = cfi;
                await localforage.setItem('library_metadata', libraryData);
            }
        }

        document.getElementById('btn-home').addEventListener('click', () => {
            viewerContainer.style.display = 'none';
            libraryScreen.style.display = 'flex';
            libraryHeader.style.display = 'flex';
            toggleReaderUI(false);
            closeAllOverlays();
            document.title = "Photon Reader";
            currentActiveBookId = null;
            if(book) { book.destroy(); rendition = null; viewerElement.innerHTML = ''; }
        });

        // --- Interaction & UI Bindings ---

        document.getElementById('center-zone').addEventListener('click', () => toggleReaderUI());
        document.getElementById('prev-zone').addEventListener('click', prevPage);
        document.getElementById('next-zone').addEventListener('click', nextPage);
        document.getElementById('btn-settings-toggle').addEventListener('click', toggleSettings);
        document.getElementById('btn-menu').addEventListener('click', () => toggleMenu());

        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
                document.getElementById('btn-fullscreen').innerHTML = '<i data-lucide="minimize" class="w-4 h-4"></i> Exit Fullscreen';
            } else {
                document.exitFullscreen();
                document.getElementById('btn-fullscreen').innerHTML = '<i data-lucide="maximize" class="w-4 h-4"></i> Fullscreen';
            }
            lucide.createIcons();
            toggleSettings(); // Close settings after clicking
        });

        function nextPage() {
            if (isAnimating || !rendition) return;
            isAnimating = true; toggleReaderUI(false); closeAllOverlays();
            viewerElement.classList.add('turn-next-out');
            setTimeout(() => { rendition.next().then(() => { viewerElement.classList.remove('turn-next-out'); viewerElement.classList.add('turn-next-in'); setTimeout(() => { viewerElement.classList.remove('turn-next-in'); isAnimating = false; }, 400); }); }, 300); 
        }

        function prevPage() {
            if (isAnimating || !rendition) return;
            isAnimating = true; toggleReaderUI(false); closeAllOverlays();
            viewerElement.classList.add('turn-prev-out');
            setTimeout(() => { rendition.prev().then(() => { viewerElement.classList.remove('turn-prev-out'); viewerElement.classList.add('turn-prev-in'); setTimeout(() => { viewerElement.classList.remove('turn-prev-in'); isAnimating = false; }, 400); }); }, 300);
        }

        document.addEventListener('keyup', (e) => {
            if(viewerContainer.style.display === 'flex') {
                if(e.key === 'ArrowRight') nextPage();
                if(e.key === 'ArrowLeft') prevPage();
                if(e.key === ' ' || e.key === 'Escape') { toggleReaderUI(); closeAllOverlays(); }
            }
        });

        window.setTheme = function(theme) {
            // Update Body Classes
            document.body.className = `theme-${theme} flex flex-col h-screen w-screen`;
            // Update ePub iframe
            if (rendition) rendition.themes.select(theme);
            if (settingsVisible) toggleSettings(); // close menu
        };

        document.getElementById('btn-font-increase').addEventListener('click', () => { if (currentFontSize < 200) { currentFontSize += 10; updateFontSize(); }});
        document.getElementById('btn-font-decrease').addEventListener('click', () => { if (currentFontSize > 70) { currentFontSize -= 10; updateFontSize(); }});
        
        function updateFontSize() {
            document.getElementById('font-size-display').textContent = `${currentFontSize}%`;
            if (rendition) rendition.themes.fontSize(`${currentFontSize}%`);
        }

        // PWA Setup
        function setupPWA() {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512; const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1A1A1A'; ctx.fillRect(0, 0, 512, 512); ctx.fillStyle = '#818CF8'; ctx.beginPath(); ctx.arc(256, 256, 48, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#818CF8'; ctx.lineWidth = 20; ctx.beginPath(); ctx.ellipse(256, 256, 180, 55, 30 * Math.PI/180, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(256, 256, 180, 55, 150 * Math.PI/180, 0, Math.PI * 2); ctx.stroke();
            
            const manifest = { name: "Photon Reader", short_name: "Photon", display: "standalone", background_color: "#F9F7F1", theme_color: "#4F46E5", icons: [{ src: canvas.toDataURL('image/png'), sizes: "512x512", type: "image/png", purpose: "any maskable" }] };
            const linkManifest = document.createElement('link'); linkManifest.rel = 'manifest'; linkManifest.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest)); document.head.appendChild(linkManifest);
            
            const swCode = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('activate', e => self.clients.claim()); self.addEventListener('fetch', e => { e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(()=>new Response('')))); });`;
            if ('serviceWorker' in navigator) {
                // Catch the blob protocol error gracefully so it doesn't throw an unhandled rejection
                navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode], {type: 'application/javascript'})))
                .catch(err => console.log('Service Worker skipped: Browser restricts blob URLs. Offline library will still function via IndexedDB.'));
            }
        }
        setupPWA();
        initApp();
    </script>
</body>
</html>
